<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AuraOne Brand Identity</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Manrope:wght@200..800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed": "#a3a6ff",
            "inverse-on-surface": "#55545e",
            "primary-container": "#9598f0",
            "on-primary": "#212275",
            "secondary-fixed": "#64e1ff",
            "on-primary-container": "#13136a",
            "surface-container-low": "#13131c",
            "secondary-container": "#00687a",
            "tertiary-fixed-dim": "#00efce",
            "surface-tint": "#a3a6ff",
            "surface-bright": "#2b2b38",
            "on-surface-variant": "#acaab5",
            "on-secondary-fixed": "#003a45",
            "on-tertiary-fixed": "#00483d",
            "on-error": "#490013",
            "surface-container-highest": "#252531",
            "tertiary-dim": "#00e8c9",
            "tertiary": "#b6ffed",
            "tertiary-container": "#26fedc",
            "surface-dim": "#0d0d16",
            "primary-dim": "#9598f0",
            "background": "#0d0d16",
            "secondary-dim": "#3fceed",
            "outline-variant": "#484751",
            "secondary": "#52ddfc",
            "surface": "#0d0d16",
            "surface-container-high": "#1f1f2a",
            "outline": "#76747f",
            "on-tertiary-fixed-variant": "#006859",
            "on-tertiary-container": "#005d4f",
            "error": "#ff6e84",
            "on-error-container": "#ffb2b9",
            "on-tertiary": "#006657",
            "on-primary-fixed": "#030057",
            "secondary-fixed-dim": "#47d4f3",
            "on-secondary-fixed-variant": "#005968",
            "primary-fixed-dim": "#9598f0",
            "error-container": "#a70138",
            "inverse-primary": "#5356a9",
            "surface-container": "#191923",
            "on-surface": "#f2effb",
            "tertiary-fixed": "#26fedc",
            "surface-variant": "#252531",
            "surface-container-lowest": "#000000",
            "error-dim": "#d73357",
            "primary": "#a3a6ff",
            "on-secondary": "#004b58",
            "on-primary-fixed-variant": "#2a2c7e",
            "inverse-surface": "#fcf8ff",
            "on-secondary-container": "#ecfaff",
            "on-background": "#f2effb"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Manrope"],
            "label": ["Space Grotesk"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #0d0d16;
      margin: 0;
      overflow: hidden;
    }

    .neural-glow {
      filter: drop-shadow(0 0 15px rgba(163, 166, 255, 0.4)) drop-shadow(0 0 30px rgba(83, 221, 252, 0.2));
    }

    .wordmark-glow {
      text-shadow: 0 0 20px rgba(163, 166, 255, 0.3);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen">
  <!-- Brand Identity Container -->
  <div class="flex flex-col items-center gap-12 max-w-4xl px-8">
    <!-- Isolated High-Fidelity SVG Logo -->
    <div class="relative group">
      <!-- Background Radial Glow -->
      <div class="absolute inset-0 bg-primary/10 blur-[100px] rounded-full scale-150 -z-10"></div>
      <svg class="w-64 h-64 md:w-80 md:h-80 neural-glow" fill="none" viewbox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg">
        <defs>
          <lineargradient id="primaryGradient" x1="0%" x2="100%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#a3a6ff"></stop>
            <stop offset="100%" stop-color="#5356a9"></stop>
          </lineargradient>
          <lineargradient id="secondaryGradient" x1="100%" x2="0%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#52ddfc"></stop>
            <stop offset="100%" stop-color="#00687a"></stop>
          </lineargradient>
          <filter height="140%" id="glowEffect" width="140%" x="-20%" y="-20%">
            <fegaussianblur result="blur" stddeviation="4"></fegaussianblur>
            <fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
          </filter>
        </defs>
        <!-- Outer Neural Rings -->
        <circle cx="100" cy="100" opacity="0.3" r="85" stroke="url(#secondaryGradient)" stroke-dasharray="4 8"
          stroke-width="0.5"></circle>
        <circle cx="100" cy="100" opacity="0.5" r="70" stroke="url(#primaryGradient)" stroke-dasharray="20 10"
          stroke-width="1"></circle>
        <!-- Central Node Complex -->
        <g filter="url(#glowEffect)">
          <!-- Overlapping Bioluminescent Orbs -->
          <circle cx="100" cy="100" fill="url(#primaryGradient)" fill-opacity="0.15" r="35"></circle>
          <circle cx="115" cy="85" fill="url(#secondaryGradient)" fill-opacity="0.2" r="25"></circle>
          <!-- Abstract Neural Paths -->
          <path d="M100 40 C 130 40, 160 70, 160 100 S 130 160, 100 160 S 40 130, 40 100 S 70 40, 100 40"
            stroke="url(#primaryGradient)" stroke-linecap="round" stroke-width="2.5"></path>
          <path d="M100 65 C 120 65, 135 80, 135 100 S 120 135, 100 135 S 65 120, 65 100 S 80 65, 100 65"
            stroke="url(#secondaryGradient)" stroke-linecap="round" stroke-width="1.5"></path>
          <!-- Core Glow Points -->
          <circle cx="100" cy="100" fill="#f2effb" r="6"></circle>
          <circle cx="135" cy="100" fill="#52ddfc" r="3"></circle>
          <circle cx="65" cy="100" fill="#a3a6ff" r="3"></circle>
          <circle cx="100" cy="65" fill="#52ddfc" r="3"></circle>
          <circle cx="100" cy="135" fill="#a3a6ff" r="3"></circle>
        </g>
        <!-- Micro-Connectors -->
        <line opacity="0.6" stroke="#a3a6ff" stroke-width="0.5" x1="100" x2="100" y1="65" y2="40"></line>
        <line opacity="0.6" stroke="#a3a6ff" stroke-width="0.5" x1="100" x2="100" y1="135" y2="160"></line>
        <line opacity="0.6" stroke="#52ddfc" stroke-width="0.5" x1="65" x2="40" y1="100" y2="100"></line>
        <line opacity="0.6" stroke="#52ddfc" stroke-width="0.5" x1="135" x2="160" y1="100" y2="100"></line>
      </svg>
    </div>
    <!-- Futuristic Wordmark -->
    <div class="flex flex-col items-center gap-2">
      <h1
        class="font-headline text-7xl md:text-9xl font-bold tracking-tighter text-on-surface wordmark-glow flex items-baseline">
        <span class="text-primary-fixed">Aura</span><span class="italic text-secondary font-light">One</span>
      </h1>
      <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
      <p class="font-label text-secondary tracking-[0.5em] uppercase text-xs mt-4 opacity-60">
        Neural Optimization Core
      </p>
    </div>
  </div>
  <!-- Background Decorative Elements -->
  <div class="fixed inset-0 pointer-events-none -z-20 overflow-hidden">
    <!-- Soft top-left cyan glow -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[120px]"></div>
    <!-- Soft bottom-right indigo glow -->
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
  </div>
</body>

</html>
